<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallpaper Catalog · Live Wallpaper API</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --neon-blue:#00f5ff;
  --neon-pink:#ff2d78;
  --neon-green:#39ff14;
  --dark:#030712;
  --dark2:#0a0f1e;
  --dark3:#0f172a;
  --grid:#1a2744;
  --text:#c8d8f0;
  --mono:'Space Mono',monospace;
  --display:'Bebas Neue',sans-serif;
}

html{scroll-behavior:smooth}

body{
  background:var(--dark);
  color:var(--text);
  font-family:var(--mono);
  min-height:100vh;
  overflow-x:hidden;
  cursor:crosshair;
}

#bg-canvas{
  position:fixed;inset:0;z-index:0;opacity:.5;
  pointer-events:none;
}

body::after{
  content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.1) 2px,rgba(0,0,0,.1) 4px);
}
body::before{
  content:'';position:fixed;inset:-50%;z-index:9998;pointer-events:none;
  width:200%;height:200%;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity:.03;animation:grain .8s steps(2) infinite;
}
@keyframes grain{0%,100%{transform:translate(0)}25%{transform:translate(-2%,-1%)}50%{transform:translate(1%,2%)}75%{transform:translate(-1%,1%)}}

/* === CURSOR === */
.cursor-dot{position:fixed;top:0;left:0;width:4px;height:4px;background:var(--neon-pink);border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);transition:width .15s,height .15s;box-shadow:0 0 6px var(--neon-pink)}
.cursor-ring{position:fixed;top:0;left:0;width:28px;height:28px;border:1px solid rgba(0,245,255,.5);border-radius:50%;pointer-events:none;z-index:99998;transform:translate(-50%,-50%)}
.coords{position:fixed;bottom:1.5rem;right:1.5rem;font-size:.55rem;letter-spacing:.15em;color:#1a2744;z-index:100;text-align:right}

/* === LAYOUT === */
.wrapper{
  position:relative;z-index:10;
  max-width:1200px;margin:0 auto;padding:0 2rem;
}

/* === NAV === */
nav{
  padding:1.5rem 0;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--grid);
  position:sticky;top:0;z-index:500;
  background:rgba(3,7,18,.85);
  backdrop-filter:blur(12px);
}
.nav-logo{
  font-family:var(--display);font-size:1.4rem;letter-spacing:.12em;
  color:#fff;text-decoration:none;
}
.nav-logo span{color:var(--neon-pink)}
.nav-right{display:flex;align-items:center;gap:1.5rem;font-size:.6rem;letter-spacing:.15em;color:#3a5070}
.nav-count{
  display:flex;align-items:center;gap:.4rem;
  color:var(--neon-green);
}
.nav-count::before{content:'';width:5px;height:5px;background:var(--neon-green);border-radius:50%;animation:blink 1.2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.back-link{color:#3a5070;text-decoration:none;font-size:.6rem;letter-spacing:.15em;display:flex;align-items:center;gap:.4rem;transition:color .2s}
.back-link:hover{color:var(--neon-blue)}
.back-link::before{content:'←'}

/* === HEADER === */
.page-header{padding:3.5rem 0 2.5rem}
.eyebrow{
  font-size:.6rem;letter-spacing:.35em;text-transform:uppercase;
  color:var(--neon-pink);margin-bottom:1rem;
  display:flex;align-items:center;gap:.6rem;
}
.eyebrow::before{content:'//';opacity:.4}
.page-title{
  font-family:var(--display);
  font-size:clamp(3rem,8vw,6rem);
  line-height:.9;letter-spacing:.03em;color:#fff;
}
.page-title em{
  font-style:normal;color:transparent;
  -webkit-text-stroke:1.5px var(--neon-blue);
  text-shadow:none;
}
.page-meta{
  margin-top:1.5rem;font-size:.7rem;color:#3a5070;
  letter-spacing:.08em;line-height:2;
  display:flex;align-items:center;gap:2rem;flex-wrap:wrap;
}
.page-meta span{color:#5a7494}
.divider{
  width:100%;height:1px;
  background:linear-gradient(90deg,transparent,var(--neon-pink),var(--neon-blue),transparent);
  margin:0 0 3rem;position:relative;
}
.divider::after{
  content:'';position:absolute;top:-2px;left:50%;transform:translateX(-50%);
  width:4px;height:5px;background:var(--neon-pink);box-shadow:0 0 10px var(--neon-pink);
}

/* === FILTER ROW === */
.filter-row{
  display:flex;align-items:center;gap:1rem;margin-bottom:2.5rem;flex-wrap:wrap;
}
.filter-label{font-size:.6rem;letter-spacing:.2em;color:#3a5070;text-transform:uppercase}
.filter-btn{
  padding:.35rem .9rem;background:transparent;border:1px solid var(--grid);
  color:#3a5070;font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;
  cursor:pointer;transition:all .2s;
  clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);
}
.filter-btn:hover,.filter-btn.active{border-color:var(--neon-blue);color:var(--neon-blue)}
.filter-btn.active{background:rgba(0,245,255,.06)}

/* === CARD GRID === */
.catalog{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
  gap:2px;
  margin-bottom:4rem;
}

/* === CARD === */
.card{
  position:relative;background:var(--dark2);
  overflow:hidden;
  transition:transform .3s,box-shadow .3s;
  cursor:pointer;
}
.card::before{
  content:'';position:absolute;inset:0;z-index:5;pointer-events:none;
  background:linear-gradient(180deg,transparent 50%,rgba(3,7,18,.95) 100%);
  transition:opacity .3s;
}
.card:hover{
  transform:scale(1.01);
  box-shadow:0 0 0 1px var(--neon-blue),0 0 40px rgba(0,245,255,.1);
  z-index:10;
}
.card:hover::before{opacity:.7}

/* video preview */
.card-video-wrap{
  width:100%;aspect-ratio:16/9;overflow:hidden;
  background:var(--dark3);position:relative;
}
.card-video-wrap video{
  width:100%;height:100%;object-fit:cover;
  display:block;transition:transform .6s ease;
}
.card:hover .card-video-wrap video{transform:scale(1.04)}

/* loading skeleton */
.skeleton{
  position:absolute;inset:0;
  background:linear-gradient(90deg,var(--dark3) 25%,var(--dark2) 50%,var(--dark3) 75%);
  background-size:200% 100%;
  animation:shimmer 1.5s infinite;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* card corner accent */
.card-corner{
  position:absolute;top:0;right:0;z-index:6;
  width:24px;height:24px;
  border-top:1px solid var(--neon-blue);
  border-right:1px solid var(--neon-blue);
  opacity:0;transition:opacity .3s;
}
.card:hover .card-corner{opacity:1}

/* card index badge */
.card-index{
  position:absolute;top:12px;left:12px;z-index:7;
  font-size:.55rem;letter-spacing:.2em;
  color:var(--neon-blue);
  background:rgba(3,7,18,.8);
  border:1px solid rgba(0,245,255,.2);
  padding:.2rem .5rem;
  clip-path:polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%);
}

/* play indicator */
.play-indicator{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:7;
  width:48px;height:48px;border-radius:50%;
  border:1.5px solid rgba(255,255,255,.3);
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.4);
  opacity:0;transition:opacity .3s;
  pointer-events:none;
}
.play-indicator svg{fill:#fff;width:16px;height:16px;margin-left:3px}
.card.paused .play-indicator{opacity:1}

/* card body */
.card-body{
  position:absolute;bottom:0;left:0;right:0;z-index:8;
  padding:1.2rem 1.2rem 1.4rem;
}
.card-title{
  font-family:var(--display);
  font-size:1.3rem;letter-spacing:.06em;
  color:#fff;line-height:1.1;
  margin-bottom:.6rem;
  text-shadow:0 2px 12px rgba(0,0,0,.8);
}
.card-filename{
  font-size:.58rem;letter-spacing:.08em;color:#3a5070;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin-bottom:.9rem;
}
.card-actions{
  display:flex;align-items:center;gap:.6rem;
  opacity:0;transform:translateY(6px);
  transition:opacity .3s,transform .3s;
}
.card:hover .card-actions{opacity:1;transform:translateY(0)}

.action-btn{
  display:inline-flex;align-items:center;gap:.35rem;
  padding:.4rem .85rem;
  font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;
  cursor:pointer;border:none;transition:all .2s;
  clip-path:polygon(5px 0%,100% 0%,calc(100% - 5px) 100%,0% 100%);
  text-decoration:none;
}
.action-dl{background:var(--neon-pink);color:#000;font-weight:700}
.action-dl:hover{background:#fff}
.action-copy-url{background:transparent;border:1px solid rgba(0,245,255,.3);color:var(--neon-blue)}
.action-copy-url:hover{background:rgba(0,245,255,.08);border-color:var(--neon-blue)}
.action-mute{background:transparent;border:1px solid rgba(255,255,255,.1);color:#5a7494;padding:.4rem .6rem}
.action-mute:hover{border-color:rgba(255,255,255,.3);color:#fff}

/* === LOADING STATE === */
.loading-screen{
  position:fixed;inset:0;z-index:1000;
  background:var(--dark);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1.5rem;
  transition:opacity .6s;
}
.loading-screen.fade{opacity:0;pointer-events:none}
.loading-logo{font-family:var(--display);font-size:3rem;letter-spacing:.2em;color:#fff}
.loading-logo span{color:var(--neon-pink)}
.loading-bar-wrap{width:200px;height:1px;background:var(--grid);position:relative;overflow:hidden}
.loading-bar{height:100%;background:linear-gradient(90deg,var(--neon-blue),var(--neon-pink));width:0;transition:width .4s}
.loading-txt{font-size:.6rem;letter-spacing:.2em;color:#3a5070;text-transform:uppercase}

/* === EMPTY / ERROR === */
.status-msg{
  grid-column:1/-1;
  padding:4rem;text-align:center;
  font-size:.75rem;letter-spacing:.1em;color:#3a5070;
}
.status-msg strong{color:var(--neon-pink);display:block;font-family:var(--display);font-size:2rem;letter-spacing:.1em;margin-bottom:.5rem}

/* === FOOTER === */
footer{
  border-top:1px solid var(--grid);padding:2rem 0 3rem;
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;
  font-size:.6rem;letter-spacing:.08em;color:#2a3d55;
}
footer a{color:#3a5070;text-decoration:none;transition:color .2s}
footer a:hover{color:var(--neon-blue)}
.footer-sig{font-family:var(--display);font-size:1.2rem;color:var(--grid);letter-spacing:.2em}

@media(max-width:600px){
  .catalog{grid-template-columns:1fr}
  .page-meta{gap:1rem}
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="cursor-dot" id="cdot"></div>
<div class="cursor-ring" id="cring"></div>
<div class="coords" id="coords">X:0000 / Y:0000</div>

<!-- LOADING -->
<div class="loading-screen" id="loader">
  <div class="loading-logo">LW<span>//</span>API</div>
  <div class="loading-bar-wrap"><div class="loading-bar" id="lbar"></div></div>
  <div class="loading-txt" id="ltxt">Fetching manifest…</div>
</div>

<div class="wrapper">

  <nav>
    <a href="#" class="nav-logo">LW<span>//</span>CATALOG</a>
    <div class="nav-right">
      <div class="nav-count" id="nav-count">— wallpapers</div>
      <a href="api/" class="back-link" target="_blank">Get API </a>
    </div>
  </nav>

  <div class="page-header">
    <div class="eyebrow">Live Wallpaper API · Demo</div>
    <h1 class="page-title">WALL<br><em>PAPER</em><br>CATALOG</h1>
    <div class="page-meta">
      <div>Source <span>manifest.json</span></div>
      <div>Updated <span id="last-updated">—</span></div>
      <div>Count <span id="total-count">—</span></div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="filter-row">
    <span class="filter-label">// filter</span>
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="cat">Cat</button>
    <button class="filter-btn" data-filter="anime">Anime</button>
    <button class="filter-btn" data-filter="minimal">Minimal</button>
  </div>

  <div class="catalog" id="catalog">
    <div class="status-msg" id="catalog-status">
      <strong>LOADING</strong>Fetching wallpapers from API…
    </div>
  </div>

  <footer>
    <span>Powered by <a href="https://forzayt.github.io/Live_Wallpaper_API/data/manifest/manifest.json" target="_blank">Live Wallpaper API</a></span>
    <div class="footer-sig">LW//API</div>
    <span>Built by <a href="https://github.com/forzayt" target="_blank">forzayt</a></span>
  </footer>

</div>

<script>
/* ============ CANVAS BG ============ */
const canvas=document.getElementById('bg-canvas');
const ctx=canvas.getContext('2d');
let W,H,particles=[];
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
resize();window.addEventListener('resize',resize);

function Particle(){
  this.x=Math.random()*W;this.y=Math.random()*H;
  this.vx=(Math.random()-.5)*.4;this.vy=(Math.random()-.5)*.4;
  this.r=Math.random()*1.5+.3;this.alpha=Math.random()*.5+.1;
  this.hue=Math.random()<.3?180:Math.random()<.5?330:210;
}
Particle.prototype.update=function(){
  this.x+=this.vx;this.y+=this.vy;
  if(this.x<0)this.x=W;if(this.x>W)this.x=0;
  if(this.y<0)this.y=H;if(this.y>H)this.y=0;
};
Particle.prototype.draw=function(){
  ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
  ctx.fillStyle=`hsla(${this.hue},100%,70%,${this.alpha})`;ctx.fill();
};
for(let i=0;i<80;i++)particles.push(new Particle());

let mouseX=W/2,mouseY=H/2;
document.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY});

function drawGrid(){
  const s=60;ctx.strokeStyle='rgba(26,39,68,0.6)';ctx.lineWidth=.5;
  for(let x=0;x<W;x+=s){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
  for(let y=0;y<H;y+=s){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
}
function drawConns(){
  for(let i=0;i<particles.length;i++){
    const dm=Math.hypot(particles[i].x-mouseX,particles[i].y-mouseY);
    if(dm<140){
      ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(mouseX,mouseY);
      ctx.strokeStyle=`rgba(0,245,255,${(1-dm/140)*.12})`;ctx.lineWidth=.5;ctx.stroke();
    }
    for(let j=i+1;j<particles.length;j++){
      const d=Math.hypot(particles[i].x-particles[j].x,particles[i].y-particles[j].y);
      if(d<90){
        ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);
        ctx.strokeStyle=`rgba(26,39,68,${(1-d/90)*.5})`;ctx.lineWidth=.4;ctx.stroke();
      }
    }
  }
}
(function loop(){
  ctx.clearRect(0,0,W,H);drawGrid();drawConns();
  particles.forEach(p=>{p.update();p.draw()});
  requestAnimationFrame(loop);
})();

/* ============ CURSOR ============ */
const cdot=document.getElementById('cdot');
const cring=document.getElementById('cring');
const coordEl=document.getElementById('coords');
let rx=W/2,ry=H/2;
document.addEventListener('mousemove',e=>{
  cdot.style.left=e.clientX+'px';cdot.style.top=e.clientY+'px';
  coordEl.textContent=`X:${String(e.clientX).padStart(4,'0')} / Y:${String(e.clientY).padStart(4,'0')}`;
});
(function rl(){rx+=(mouseX-rx)*.1;ry+=(mouseY-ry)*.1;cring.style.left=rx+'px';cring.style.top=ry+'px';requestAnimationFrame(rl)})();
function bigCursor(){cdot.style.width='8px';cdot.style.height='8px';cring.style.width='44px';cring.style.height='44px'}
function normCursor(){cdot.style.width='4px';cdot.style.height='4px';cring.style.width='28px';cring.style.height='28px'}

/* ============ LOADING PROGRESS ============ */
const lbar=document.getElementById('lbar');
const ltxt=document.getElementById('ltxt');
const loader=document.getElementById('loader');
function setProgress(pct,msg){lbar.style.width=pct+'%';if(msg)ltxt.textContent=msg}
function hideLoader(){loader.classList.add('fade');setTimeout(()=>loader.remove(),700)}

/* ============ HELPERS ============ */
function slugify(name){
  return name.replace(/\.mp4$/i,'').replace(/[_-]+/g,' ').replace(/\s+/g,' ').trim();
}
function titleCase(str){
  return str.split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1).toLowerCase()).join(' ');
}
function matchFilter(name,f){
  if(f==='all')return true;
  const n=name.toLowerCase();
  if(f==='cat')return n.includes('cat');
  if(f==='anime')return n.includes('noir')||n.includes('spider')||n.includes('anime');
  if(f==='minimal')return n.includes('katana')||n.includes('minimal')||n.includes('sword');
  return true;
}

/* ============ RENDER CARDS ============ */
let allWallpapers=[];
let muteState=true;

function renderCards(wallpapers){
  const catalog=document.getElementById('catalog');
  catalog.innerHTML='';

  if(!wallpapers.length){
    catalog.innerHTML='<div class="status-msg"><strong>EMPTY</strong>No wallpapers match this filter.</div>';
    return;
  }

  wallpapers.forEach((wp,i)=>{
    const title=titleCase(slugify(wp.name));
    const card=document.createElement('div');
    card.className='card';
    card.dataset.name=wp.name.toLowerCase();

    card.innerHTML=`
      <div class="card-corner"></div>
      <div class="card-index">${String(i+1).padStart(2,'0')}</div>
      <div class="play-indicator">
        <svg viewBox="0 0 16 16"><polygon points="3,1 15,8 3,15"/></svg>
      </div>
      <div class="card-video-wrap">
        <div class="skeleton" id="sk-${i}"></div>
        <video
          id="vid-${i}"
          src="${wp.url}"
          loop
          muted
          playsinline
          preload="metadata"
          style="opacity:0;transition:opacity .5s"
        ></video>
      </div>
      <div class="card-body">
        <div class="card-title">${title}</div>
        <div class="card-filename">${wp.name}</div>
        <div class="card-actions">
          <a class="action-btn action-dl" href="${wp.url}" download="${wp.name}" target="_blank">↓ Download</a>
          <button class="action-btn action-copy-url" onclick="copyUrl('${wp.url}',this)">⌘ Copy URL</button>
          <button class="action-btn action-mute" id="mute-${i}" onclick="toggleMute(${i})">♪</button>
        </div>
      </div>
    `;

    const video=card.querySelector(`#vid-${i}`);
    const skeleton=card.querySelector(`#sk-${i}`);

    video.addEventListener('loadeddata',()=>{
      skeleton.style.display='none';
      video.style.opacity='1';
    });

    /* autoplay on intersect */
    const obs=new IntersectionObserver(entries=>{
      entries.forEach(e=>{
        if(e.isIntersecting){video.play().catch(()=>{})}
        else{video.pause()}
      });
    },{threshold:.2});
    obs.observe(card);

    /* click to pause/play */
    card.addEventListener('click',ev=>{
      if(ev.target.closest('.card-actions'))return;
      if(video.paused){video.play();card.classList.remove('paused')}
      else{video.pause();card.classList.add('paused')}
    });

    card.addEventListener('mouseenter',bigCursor);
    card.addEventListener('mouseleave',normCursor);

    catalog.appendChild(card);
  });
}

/* ============ MUTE TOGGLE ============ */
function toggleMute(i){
  const vid=document.getElementById(`vid-${i}`);
  const btn=document.getElementById(`mute-${i}`);
  vid.muted=!vid.muted;
  btn.textContent=vid.muted?'♪':'♫';
  btn.style.color=vid.muted?'':'var(--neon-green)';
}

/* ============ COPY URL ============ */
function copyUrl(url,btn){
  navigator.clipboard.writeText(url);
  const orig=btn.textContent;
  btn.textContent='✓ Copied!';
  btn.style.borderColor='var(--neon-green)';
  btn.style.color='var(--neon-green)';
  setTimeout(()=>{btn.textContent=orig;btn.style.borderColor='';btn.style.color=''},2000);
}

/* ============ FILTER ============ */
document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const f=btn.dataset.filter;
    const filtered=allWallpapers.filter(wp=>matchFilter(wp.name,f));
    renderCards(filtered);
  });
});

/* ============ FETCH + INIT ============ */
const MANIFEST='https://forzayt.github.io/Live_Wallpaper_API/data/manifest/manifest.json';

setProgress(20,'Connecting to API…');

fetch(MANIFEST)
  .then(r=>{
    setProgress(60,'Parsing manifest…');
    return r.json();
  })
  .then(data=>{
    setProgress(90,'Rendering catalog…');
    allWallpapers=data.wallpapers||[];

    document.getElementById('nav-count').innerHTML=
      `<span style="color:var(--neon-green);animation:blink 1.2s infinite;width:5px;height:5px;background:var(--neon-green);border-radius:50%;display:inline-block"></span>&nbsp;${allWallpapers.length} wallpapers`;
    document.getElementById('last-updated').textContent=
      data.lastUpdated?new Date(data.lastUpdated).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}):'—';
    document.getElementById('total-count').textContent=data.count||allWallpapers.length;

    renderCards(allWallpapers);
    setProgress(100,'Done.');
    setTimeout(hideLoader,500);
  })
  .catch(err=>{
    console.error(err);
    setProgress(100,'Error.');
    document.getElementById('catalog').innerHTML=
      '<div class="status-msg"><strong>ERROR</strong>Could not fetch the manifest. Check network or CORS.</div>';
    setTimeout(hideLoader,800);
  });
</script>
</body>
</html>
