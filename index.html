<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Hello Electron!</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        background-color: #f0f2f5;
      }
      h1 {
        color: #1a73e8;
      }
      p {
        color: #5f6368;
      }
    </style>
  </head>
  <body>
    <h1>Hello World!</h1>
    <p>We are using Node.js <span id="node-version"></span>,
    Chromium <span id="chrome-version"></span>,
    and Electron <span id="electron-version"></span>.</p>

    <script>
      document.getElementById('node-version').innerText = process.versions.node
      document.getElementById('chrome-version').innerText = process.versions.chrome
      document.getElementById('electron-version').innerText = process.versions.electron
    </script>
  </body>
</html>
