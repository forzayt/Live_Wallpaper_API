<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fwallpaper — Live Wallpaper Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #080c10;
            --surface:   #0d1520;
            --border:    rgba(255,255,255,0.06);
            --muted:     rgba(255,255,255,0.35);
            --accent:    #00e5ff;
            --accent2:   #ff6b35;
            --text:      #e8edf5;
            --glow:      0 0 40px rgba(0,229,255,0.18);
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Noise grain overlay ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
            opacity: .5;
        }

        /* ── Header ── */
        header {
            position: relative;
            padding: 72px 48px 52px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 24px;
            overflow: hidden;
        }

        header::after {
            content: '';
            position: absolute;
            left: -120px; top: -120px;
            width: 480px; height: 480px;
            background: radial-gradient(circle, rgba(0,229,255,.12) 0%, transparent 70%);
            pointer-events: none;
        }

        .logo-area h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(3.2rem, 7vw, 6.5rem);
            letter-spacing: 0.04em;
            line-height: 0.9;
            background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-area .tagline {
            margin-top: 10px;
            font-size: .85rem;
            font-weight: 300;
            letter-spacing: .18em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .header-meta {
            text-align: right;
            font-size: .78rem;
            color: var(--muted);
            font-weight: 300;
        }

        .header-meta span {
            display: block;
            font-size: 1.8rem;
            font-family: 'Bebas Neue', sans-serif;
            color: var(--accent);
            letter-spacing: .06em;
        }

        /* ── Divider ── */
        .divider {
            height: 1px;
            margin: 0 48px 56px;
            background: linear-gradient(to right, var(--accent), rgba(255,107,53,.4), transparent);
        }

        /* ── Grid ── */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(540px, 1fr));
            gap: 2px;
            padding: 0 48px 80px;
            max-width: 1800px;
            margin: 0 auto;
        }

        @media (max-width: 680px) {
            header { padding: 48px 24px 36px; flex-direction: column; align-items: flex-start; }
            .divider { margin: 0 24px 40px; }
            .grid { grid-template-columns: 1fr; padding: 0 16px 60px; }
        }

        /* ── Card ── */
        .card {
            position: relative;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            cursor: pointer;
            background: var(--surface);
            outline: none;
        }

        /* thin shared border via gap — add border on focus */
        .card:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }

        /* video fill */
        .card video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform .7s cubic-bezier(.16,1,.3,1), opacity .4s ease;
            opacity: .55;
            transform: scale(1.04);
            will-change: transform, opacity;
        }

        .card.playing video,
        .card:hover video {
            opacity: 1;
            transform: scale(1);
        }

        /* dark vignette that disappears on hover */
        .card-vignette {
            position: absolute;
            inset: 0;
            background:
                linear-gradient(to top, rgba(8,12,16,.92) 0%, transparent 55%),
                linear-gradient(to bottom, rgba(8,12,16,.5) 0%, transparent 40%);
            transition: opacity .4s ease;
            pointer-events: none;
            z-index: 1;
        }
        .card:hover .card-vignette { opacity: .5; }

        /* shimmer skeleton */
        .card-skeleton {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                100deg,
                var(--surface) 0%,
                #1a2535 40%,
                var(--surface) 60%
            );
            background-size: 200% 100%;
            animation: shimmer 1.6s ease-in-out infinite;
            z-index: 3;
            transition: opacity .5s ease;
        }
        .card-skeleton.hidden { opacity: 0; pointer-events: none; }
        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* play indicator */
        .play-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(.7);
            width: 64px; height: 64px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,.6);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity .3s ease, transform .3s cubic-bezier(.16,1,.3,1);
            z-index: 2;
            backdrop-filter: blur(8px);
            background: rgba(0,0,0,.2);
            pointer-events: none;
        }
        .play-ring svg { width: 22px; height: 22px; fill: #fff; margin-left: 3px; }
        .card:hover .play-ring {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        .card.playing .play-ring { opacity: 0; }

        /* card footer info */
        .card-footer {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 22px 24px 20px;
            z-index: 2;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 16px;
            transform: translateY(6px);
            opacity: .85;
            transition: transform .35s ease, opacity .35s ease;
        }
        .card:hover .card-footer {
            transform: translateY(0);
            opacity: 1;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: .01em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-shadow: 0 1px 8px rgba(0,0,0,.8);
        }

        .card-num {
            position: absolute;
            top: 16px; left: 20px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: .9rem;
            letter-spacing: .1em;
            color: var(--muted);
            z-index: 2;
            transition: color .3s;
        }
        .card:hover .card-num { color: var(--accent); }

        /* Set button */
        .btn-set {
            flex-shrink: 0;
            padding: 9px 20px;
            border-radius: 6px;
            border: 1px solid rgba(0,229,255,.45);
            background: rgba(0,229,255,.1);
            color: var(--accent);
            font-family: 'DM Sans', sans-serif;
            font-size: .78rem;
            font-weight: 500;
            letter-spacing: .08em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background .2s, border-color .2s, box-shadow .2s, transform .15s;
            white-space: nowrap;
            backdrop-filter: blur(12px);
        }
        .btn-set:hover {
            background: rgba(0,229,255,.22);
            border-color: var(--accent);
            box-shadow: var(--glow);
            transform: scale(1.04);
        }
        .btn-set:active { transform: scale(.97); }

        /* "Live" badge pulse */
        .live-badge {
            position: absolute;
            top: 16px; right: 18px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: .68rem;
            font-weight: 500;
            letter-spacing: .14em;
            text-transform: uppercase;
            color: var(--accent2);
            opacity: 0;
            transition: opacity .3s ease;
            z-index: 2;
        }
        .card.playing .live-badge { opacity: 1; }
        .live-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--accent2);
            animation: pulse 1.4s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: .5; transform: scale(.7); }
        }

        /* ── Empty / error state ── */
        .state-msg {
            grid-column: 1/-1;
            padding: 80px 24px;
            text-align: center;
            color: var(--muted);
            font-weight: 300;
            font-size: 1rem;
        }

        /* ── Footer ── */
        footer {
            padding: 24px 48px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: var(--muted);
            font-size: .75rem;
            font-weight: 300;
            letter-spacing: .05em;
        }
        footer a { color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <h1>Fwallpaper</h1>
        <p class="tagline">Live Wallpaper Gallery</p>
    </div>
    <div class="header-meta">
        <span id="count">—</span>
        wallpapers available
    </div>
</header>

<div class="divider"></div>

<main>
    <div class="grid" id="grid"></div>
</main>

<footer>
    <span>Hover to preview · Click <em>Set</em> to apply</span>
    <span>Fwallpaper Desktop</span>
</footer>

<script>
const MANIFEST_URL = 'https://forzayt.github.io/FwallpaperDesktop/data/manifest/manifest.json';
const grid = document.getElementById('grid');
const countEl = document.getElementById('count');

/* ── Skeleton placeholders ── */
function showSkeletons(n = 8) {
    grid.innerHTML = Array(n).fill(0).map((_, i) => `
        <div class="card" tabindex="0">
            <div class="card-skeleton"></div>
            <div class="card-vignette"></div>
            <span class="card-num">${String(i + 1).padStart(2, '0')}</span>
        </div>
    `).join('');
}

/* ── Fetch & build ── */
async function init() {
    showSkeletons(8);
    try {
        const res  = await fetch(MANIFEST_URL);
        const data = await res.json();
        const wps  = data.wallpapers || [];
        countEl.textContent = wps.length || '—';
        renderAll(wps);
    } catch (e) {
        grid.innerHTML = `<div class="state-msg">⚠ Could not load wallpapers — check your connection.</div>`;
    }
}

function renderAll(wallpapers) {
    grid.innerHTML = '';
    wallpapers.forEach((wp, i) => {
        const card = buildCard(wp, i);
        grid.appendChild(card);
        /* staggered reveal: only animate the first ~12 to avoid jank */
        if (i < 12) card.style.animationDelay = `${i * 60}ms`;
    });
}

function buildCard(wp, index) {
    const title = wp.name.replace(/\.[^/.]+$/, '').replace(/_/g, ' ');
    const num   = String(index + 1).padStart(2, '0');

    const card = document.createElement('div');
    card.className = 'card';
    card.tabIndex = 0;
    card.innerHTML = `
        <div class="card-skeleton"></div>
        <div class="card-vignette"></div>
        <span class="card-num">${num}</span>
        <div class="live-badge"><span class="live-dot"></span>Live</div>
        <div class="play-ring">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
        <div class="card-footer">
            <span class="card-title" title="${title}">${title}</span>
            <button class="btn-set" onclick="setWallpaper(event,'${wp.url}')">Set</button>
        </div>
    `;

    /* lazy-load video */
    const skeleton = card.querySelector('.card-skeleton');
    const video = document.createElement('video');
    video.muted = true;
    video.loop  = true;
    video.preload = 'metadata';
    video.playsInline = true;
    const src = document.createElement('source');
    src.src  = wp.url;
    src.type = 'video/mp4';
    video.appendChild(src);
    card.insertBefore(video, card.firstChild);

    video.onloadedmetadata = () => {
        skeleton.classList.add('hidden');
        setTimeout(() => skeleton.remove(), 500);
    };
    video.onerror = () => {
        skeleton.style.background = 'rgba(239,68,68,.08)';
        skeleton.style.animation  = 'none';
    };
    video.load();

    /* hover: play / pause */
    card.addEventListener('mouseenter', () => {
        video.play().then(() => card.classList.add('playing'));
    });
    card.addEventListener('mouseleave', () => {
        video.pause();
        video.currentTime = 0;
        card.classList.remove('playing');
    });

    /* keyboard: Space / Enter */
    card.addEventListener('keydown', e => {
        if (e.key === ' ' || e.key === 'Enter') {
            e.preventDefault();
            if (card.classList.contains('playing')) {
                video.pause(); card.classList.remove('playing');
            } else {
                video.play(); card.classList.add('playing');
            }
        }
    });

    return card;
}

function setWallpaper(e, url) {
    e.stopPropagation();
    const btn = e.currentTarget;
    btn.textContent = '✓ Set';
    btn.style.background = 'rgba(0,229,255,.28)';
    btn.style.color = '#fff';
    setTimeout(() => { btn.textContent = 'Set'; btn.style.background = ''; btn.style.color = ''; }, 1800);
    /* IPC call goes here */
    if (typeof window.__setWallpaper === 'function') window.__setWallpaper(url);
    else console.log('setWallpaper:', url);
}

init();
</script>
</body>
</html>
