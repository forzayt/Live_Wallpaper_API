<!DOCTYPE html>
<html>
<head>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: black;
        }
        video {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <video id="wallpaperVideo" autoplay muted loop playsinline></video>
    <script>
        const { ipcRenderer } = require('electron');
        const video = document.getElementById('wallpaperVideo');

        ipcRenderer.on('load-video', (event, videoPath) => {
            video.src = videoPath;
            video.play();
        });
    </script>
</body>
</html>
